<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Трекер читання</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="style-extended.css" />
</head>
<body>
  <header>
    <div style="display: flex; align-items: center; gap: 10px; flex: 1;">
      <span style="font-size: 1.8rem;">📚</span>
      <h1>Трекер читання</h1>
    </div>
    <nav>
      <button data-page="library" class="active">📖 Бібліотека</button>
      <button data-page="add">➕ Додати книгу</button>
      <button data-page="analytics">📊 Аналітика</button>
      <button data-page="community">👥 Спільнота</button>
      <button data-page="profile">👤 Профіль</button>
    </nav>
    <div class="header-settings">
      <button id="themeSettingsBtn" class="tiny-btn">⚙️ Тема</button>
      <div id="themeSettingsPanel" class="theme-panel hidden">
        <label>Колір інтерфейсу:
          <select id="themeSelect">
            <option value="default">Синя (за замовчуванням)</option>
            <option value="green">Зелена</option>
            <option value="purple">Фіолетова</option>
            <option value="warm">Тепла</option>
            <option value="dark">Темна</option>
          </select>
        </label>
      </div>
    </div>
  </header>

  <main>
    <section id="library" class="page active">
      <div class="toolbar">
        <div class="filter-group">
          <label>📁 Папка:</label>
          <select id="folderFilter"></select>
          <label>✨ Статус:</label>
          <select id="statusFilter"><option value="all">Усі</option><option value="бажаю прочитати">Бажаю прочитати</option><option value="читаю">Читаю</option><option value="прочитано">Прочитано</option><option value="закинуто">Закинуто</option></select>
          <label>🔎 Пошук:</label>
          <input id="searchInput" placeholder="Назва, автор, жанр..." />
          <label>↕️ Сортування:</label>
          <select id="sortFilter">
            <option value="date-new">📅 Нові</option>
            <option value="date-old">📅 Старі</option>
            <option value="author-a">🔤 Автор (А-Я)</option>
            <option value="author-z">🔤 Автор (Я-А)</option>
            <option value="title-a">📖 Назва (А-Я)</option>
            <option value="title-z">📖 Назва (Я-А)</option>
            <option value="rating">⭐ Рейтинг</option>
            <option value="pages-asc">📄 Сторінок ↑</option>
            <option value="pages-desc">📄 Сторінок ↓</option>
            <option value="progress">📊 Прогрес ↓</option>
          </select>
        </div>
        <div class="folder-actions" style="display:flex;gap:8px;align-items:center;">
          <input id="newFolderName" placeholder="Нова папка..." />
          <button id="createFolderBtn">➕ Папка</button>
          <button id="deleteFolderBtn" style="background:#f87171;color:#fff;">🗑️ Видалити папку</button>
        </div>
      </div>

      <div id="libraryCount" class="info"></div>
      <div id="bookList" class="book-list"></div>
    </section>

    <section id="add" class="page">
      <div style="background: rgba(255, 255, 255, 0.4); padding: 30px; border-radius: 24px; box-shadow: 0 8px 24px rgba(230, 150, 180, 0.1); border: 2px solid rgba(255, 255, 255, 0.3);">
        <div style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid rgba(200, 200, 210, 0.4); padding-bottom: 10px;">
          <button id="tabManual" class="tab-btn active" data-tab="manual" type="button">📝 Вручну</button>
          <button id="tabSearch" class="tab-btn" data-tab="search" type="button">🔍 Пошук</button>
        </div>

        <div id="tab-manual" class="tab-content active">
          <h2>📝 Додати книгу вручну</h2>
          <form id="manualForm" class="form-grid">
            <label>📖 Автор<input name="author" required /></label>
            <label>📚 Назва<input name="title" required /></label>
            <label>🏷️ Жанр<input name="genre" required /></label>
            <label>📄 Сторінок<input name="pages" type="number" min="1" required /></label>
            <label>✍️ Опис<textarea name="description" rows="4"></textarea></label>
            <label style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
              🖼️ Фото обкладинки
              <input id="coverUpload" name="cover" type="file" accept="image/*" style="display: none;" />
              <span id="coverFileName" style="color: #999; font-size: 14px;">Виберіть файл</span>
            </label>
            <img id="coverPreview" src="" alt="Preview" style="max-width: 200px; max-height: 300px; border-radius: 12px; margin-top: 10px; display: none;" />
            <button type="submit">➕ Додати книгу</button>
          </form>
        </div>

        <div id="tab-search" class="tab-content">
          <h2>🔍 Пошук по зовнішній базі</h2>
          <div class="search-external" style="margin-bottom: 20px; display:flex; gap:8px; align-items:center;">
            <input id="externalSearchInput" placeholder="Введіть назву або автора..." style="flex: 1; min-width: 220px; padding: 10px; border:1px solid #cbd5e1; border-radius: 8px;" />
            <button id="externalSearchBtn" type="button" style="padding: 10px 18px; border-radius: 8px;">🔍 Шукати</button>
          </div>
          <div id="externalResults" class="book-list"></div>
        </div>

      </div>
    </section>

    <section id="analytics" class="page">
      <h2>📊 Аналітика читання</h2>
      <div id="stats" class="stats-grid"></div>
      <div id="calendar" class="calendar"></div>
      <div id="progressChart"></div>
    </section>

    <section id="community" class="page">
      <h2>👥 Спільнота</h2>
      <div style="background: rgba(255, 255, 255, 0.4); padding: 20px; border-radius: 20px; box-shadow: 0 8px 24px rgba(230, 150, 180, 0.1); border: 2px solid rgba(255, 255, 255, 0.3); margin-bottom: 20px;">
        <p style="color: #7a7a8a;">🌟 Стрічка активності читачів</p>
      </div>
      <div id="activityFeed" class="feed"></div>
    </section>

    <section id="profile" class="page">
      <h2>👤 Мій Профіль</h2>
      <div id="profileInfo" class="profile-card"></div>
      <h3 style="margin-top: 24px; color: #6b4a52;">📖 Остання активність</h3>
      <div id="profileFeed" class="feed"></div>
    </section>
  </main>

  <div id="bookModal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" class="close-btn">✕</button>
      <div style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid rgba(200, 200, 210, 0.4); padding-bottom: 10px;">
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- JS модулі -->
  <script src="js/state.js"></script>
  <script src="js/placeholder-fallback.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/library.js"></script>
  <script src="js/reading.js"></script>
  <script src="js/community.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/features.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
  <script src="js/init-features.js"></script>
  <script src="js/init-profile.js"></script>
  <script src="js/init-advanced.js"></script>
  <script src="js/init-notes-ratings-reviews.js"></script>
  <script src="js/init-community-new.js"></script>
  
  <!-- 📚 LIBRARY EXTENDED FEATURES -->
  <script src="js/library-extended.js"></script>
  <script src="js/library-extended-ui.js"></script>
  <script src="js/library-extended-handlers.js"></script>
</body>
</html>
